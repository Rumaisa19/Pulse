name: pulse_news
description: A modern news app powered by The Guardian API.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  json_annotation: ^4.9.0
  provider: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  connectivity_plus: ^7.0.0
  flutter_dotenv: ^5.2.1 
  go_router: ^13.0.0
  google_fonts: ^6.2.1  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Using 'any' allows the pub resolver to fix the source_gen conflict
  build_runner: any 
  json_serializable: any
  hive_generator: any
  rename: ^3.1.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - .env
    